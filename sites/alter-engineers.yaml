# Bloob Haus Site Config — alter-engineers
# Infrastructure settings only. Author settings live in _bloob-settings.md in the vault.

site:
  url: "https://alterengineers.com"

content:
  repo: "altron-alters/website-content"
  branch: "master"
  exclude_files:
    - "README.md"

features:
  search: true
  og_images: true
  magic_machines: false
  embed: false

graph:
  extra_fields:
    project-profile:
      - building_type
      - construction_type
      - location
      - sqft
      - services
      - target
      - tags
