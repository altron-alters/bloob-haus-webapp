# Bloob Haus Site Config — marbles
# Infrastructure settings only. Author settings live in _bloob-settings.md in the vault.

# Deployed URL (webapp infra — Cloudflare)
site:
  url: "https://leons.bloob.haus"

# Content source (webapp infra — GitHub)
content:
  repo: "LSanten/bloob-haus-marbles"
  branch: "main"

# URL slug strategy: preserve-case keeps original filename casing, spaces → hyphens
permalinks:
  strategy: preserve-case

# Build features
features:
  search: true   # Pagefind search index — enables search bar on homepage
  magic_machines: true
  date_from_filename: true   # YYYY-MM-DD- filename prefix → date_created (date stays in URL)
  # date_prefix_slugs: false # (default) strip the YYYY-MM-DD- prefix from the URL slug — off for now
